<section class="dashboard-section">
    <h1>Dashboard</h1>

    <div class="dashboard-theme-row">
        <span class="dashboard-theme-label">Theme</span>
        <fieldset class="theme-switcher" aria-label="Dashboard theme switcher">
            <legend class="theme-switcher__legend">Choose theme</legend>
            <label class="theme-switcher__option">
                <input class="theme-switcher__input" type="radio" name="theme" value="light" c-option="1" checked />
                <svg class="theme-switcher__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 36 36">
                    <path fill="var(--theme-icon)" fill-rule="evenodd" d="M18 12a6 6 0 1 1 0 12 6 6 0 0 1 0-12Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" clip-rule="evenodd"/>
                    <path fill="var(--theme-icon)" d="M17 6.038a1 1 0 1 1 2 0v3a1 1 0 0 1-2 0v-3ZM24.244 7.742a1 1 0 1 1 1.618 1.176L24.1 11.345a1 1 0 1 1-1.618-1.176l1.763-2.427ZM29.104 13.379a1 1 0 0 1 .618 1.902l-2.854.927a1 1 0 1 1-.618-1.902l2.854-.927ZM29.722 20.795a1 1 0 0 1-.619 1.902l-2.853-.927a1 1 0 1 1 .618-1.902l2.854.927ZM25.862 27.159a1 1 0 0 1-1.618 1.175l-1.763-2.427a1 1 0 1 1 1.618-1.175l1.763 2.427ZM19 30.038a1 1 0 0 1-2 0v-3a1 1 0 1 1 2 0v3ZM11.755 28.334a1 1 0 0 1-1.618-1.175l1.764-2.427a1 1 0 1 1 1.618 1.175l-1.764 2.427ZM6.896 22.697a1 1 0 1 1-.618-1.902l2.853-.927a1 1 0 1 1 .618 1.902l-2.853.927ZM6.278 15.28a1 1 0 1 1 .618-1.901l2.853.927a1 1 0 1 1-.618 1.902l-2.853-.927ZM10.137 8.918a1 1 0 0 1 1.618-1.176l1.764 2.427a1 1 0 0 1-1.618 1.176l-1.764-2.427Z"/>
                </svg>
            </label>
            <label class="theme-switcher__option">
                <input class="theme-switcher__input" type="radio" name="theme" value="dark" c-option="2" />
                <svg class="theme-switcher__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 36 36">
                    <path fill="var(--theme-icon)" d="M12.5 8.473a10.968 10.968 0 0 1 8.785-.97 7.435 7.435 0 0 0-3.737 4.672l-.09.373A7.454 7.454 0 0 0 28.732 20.4a10.97 10.97 0 0 1-5.232 7.125l-.497.27c-5.014 2.566-11.175.916-14.234-3.813l-.295-.483C5.53 18.403 7.13 11.93 12.017 8.77l.483-.297Zm4.234.616a8.946 8.946 0 0 0-2.805.883l-.429.234A9 9 0 0 0 10.206 22.5l.241.395A9 9 0 0 0 22.5 25.794l.416-.255a8.94 8.94 0 0 0 2.167-1.99 9.433 9.433 0 0 1-2.782-.313c-5.043-1.352-8.036-6.535-6.686-11.578l.147-.491c.242-.745.573-1.44.972-2.078Z"/>
                </svg>
            </label>
            <label class="theme-switcher__option">
                <input class="theme-switcher__input" type="radio" name="theme" value="reading" c-option="3" />
                <svg class="theme-switcher__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 36 36">
                    <path fill="var(--theme-icon)" d="M5 21a1 1 0 0 1 1-1h24a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1ZM12 25a1 1 0 0 1 1-1h10a1 1 0 1 1 0 2H13a1 1 0 0 1-1-1ZM15 29a1 1 0 0 1 1-1h4a1 1 0 1 1 0 2h-4a1 1 0 0 1-1-1ZM18 13a6 6 0 0 1 5.915 7h-2.041A4.005 4.005 0 0 0 18 15a4 4 0 0 0-3.874 5h-2.041A6 6 0 0 1 18 13ZM17 7.038a1 1 0 1 1 2 0v3a1 1 0 0 1-2 0v-3ZM24.244 8.742a1 1 0 1 1 1.618 1.176L24.1 12.345a1 1 0 1 1-1.618-1.176l1.763-2.427ZM29.104 14.379a1 1 0 0 1 .618 1.902l-2.854.927a1 1 0 1 1-.618-1.902l2.854-.927ZM6.278 16.28a1 1 0 1 1 .618-1.901l2.853.927a1 1 0 1 1-.618 1.902l-2.853-.927ZM10.137 9.918a1 1 0 0 1 1.618-1.176l1.764 2.427a1 1 0 0 1-1.618 1.176l-1.764-2.427Z"/>
                </svg>
            </label>
            <div class="theme-switcher__filter">
                <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
                    <defs>
                        <filter id="theme-filter">
                            <feGaussianBlur in="SourceGraphic" stdDeviation="0.04" result="blur"/>
                            <feDisplacementMap in="blur" in2="SourceGraphic" scale="0.5" xChannelSelector="R" yChannelSelector="G"/>
                        </filter>
                    </defs>
                </svg>
            </div>
        </fieldset>
    </div>
    
    <div class="stats-grid">
        <article class="stat-card glass">
            <div class="stat-accent stat-accent-users" aria-hidden="true"></div>
            <div class="stat-content">
                <h3>Active Users</h3>
                <p class="stat-number">—</p>
                <p class="stat-label">Online right now</p>
            </div>
        </article>

        <article class="stat-card glass">
            <div class="stat-accent stat-accent-total" aria-hidden="true"></div>
            <div class="stat-content">
                <h3>Total Users</h3>
                <p class="stat-number">—</p>
                <p class="stat-label">Registered users</p>
            </div>
        </article>

        <article class="stat-card glass clock-card">
            <div class="stat-content clock-content">
                <div class="mini-analog-clock" aria-label="Analog clock" title="Local time">
                    <span class="clock-hand hour" id="analogHourHand"></span>
                    <span class="clock-hand minute" id="analogMinuteHand"></span>
                    <span class="clock-hand second" id="analogSecondHand"></span>
                    <span class="clock-center-dot"></span>
                </div>
                <h3>Current Time</h3>
                <p class="clock-time" id="clockTime">--:--:--</p>
                <p class="clock-date" id="clockDate">Loading date...</p>
                <div class="clock-meta">
                    <span class="clock-zone" id="timeZoneLabel">Local Time</span>
                    <span class="clock-credits">AI Credits: —</span>
                </div>
            </div>
        </article>
    </div>

    <!-- Your Profile -->
    <article class="profile-card glass">
        <h2>Your Profile</h2>
        <div class="profile-info">
            <div class="info-item">
                <span class="label">Username</span>
                <span class="value">Guest</span>
            </div>
            <div class="info-item">
                <span class="label">Credits</span>
                <span class="value credits">— credits</span>
            </div>
            <div class="info-item">
                <span class="label">Email</span>
                <span class="value">—</span>
            </div>
        </div>
    </article>
</section>

<script>
    function updateDateTime() {
        const now = new Date();
        const timeText = now.toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true,
        });
        const dateText = now.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: '2-digit',
        });

        const seconds = now.getSeconds();
        const minutes = now.getMinutes();
        const hours = now.getHours() % 12;

        const secondDeg = seconds * 6;
        const minuteDeg = (minutes + seconds / 60) * 6;
        const hourDeg = (hours + minutes / 60) * 30;

        document.getElementById('clockTime').textContent = timeText;
        document.getElementById('clockDate').textContent = dateText;
        document.getElementById('timeZoneLabel').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById('analogSecondHand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
        document.getElementById('analogMinuteHand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
        document.getElementById('analogHourHand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
    }
    
    updateDateTime();
    setInterval(updateDateTime, 1000);
</script>
    </main>
</body>
